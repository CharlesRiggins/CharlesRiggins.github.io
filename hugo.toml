baseURL = "https://charlesriggins.github.io/"
languageCode = "en-us"
title = "Charles Chen blog"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

# Enable raw HTML in markdown (needed for some math/embeds)
[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "github"

[params]
  env = "production"
  description = "Personal blog"
  author = "Charles Chen"
  defaultTheme = "auto"        # auto | light | dark — shows the sun/moon toggle
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowToc = false
  disableThemeToggle = false
  # math is enabled per-post via `math: true` in front matter

  [params.homeInfoParams]
    Title = "Charles Chen"
    Content = """
Welcome to my blog. I write about things I find interesting.

<img style="padding-top:10px;width:100%;height:auto" src="/images/home.jpg" alt="Sand dunes and a lone acacia tree in Sossusvlei, Namibia">
<span style="display:block;font-size:0.7em;opacity:0.55;padding-bottom:10px">Photo: <a href="https://commons.wikimedia.org/wiki/File:Duna_Elim,_Sossusvlei,_Namibia,_2018-08-06,_DD_165-162_PAN.jpg">Diego Delso</a>, <a href="https://creativecommons.org/licenses/by-sa/4.0">CC BY-SA 4.0</a></span>
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/CharlesRiggins"

# Left nav menu (like the "About" link on Keller's site)
[menu]
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]
